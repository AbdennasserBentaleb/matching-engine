version: "3.8"
services:
  postgres:
    image: postgres:15-alpine
    container_name: matching-engine-db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: matching_engine
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: matching-engine-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  matching-engine:
    build: .
    container_name: matching-engine-app
    ports:
      - "8888:8080"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/matching_engine
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - SPRING_REDIS_HOST=redis
    depends_on:
      - postgres
      - redis

volumes:
  postgres-data:
  redis-data:
